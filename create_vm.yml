---
- name: Create VM {{ vm.name }}
  community.vmware.vmware_guest:
    hostname: "{{ esxi_host }}"
    username: "{{ esxi_user }}"
    password: "{{ esxi_pass }}"
    validate_certs: false

    name: "{{ vm.name }}"

    folder: "/"
    datastore: "{{ datastore_name }}"
    template: "{{ template_name }}"

    state: poweredon
    wait_for_ip_address: true

    hardware:
      memory_mb: "{{ vm.memory }}"
      num_cpus: "{{ vm.cpu }}"
      scsi: paravirtual

    disk:
      - size_gb: "{{ vm.disk }}"
        type: thin
        datastore: "{{ datastore_name }}"

    networks:
      - name: "{{ network_name }}"
        type: static
        ip: "{{ vm.ip_address }}"
        netmask: "{{ netmask }}"
        gateway: "{{ gateway }}"

    customization:
      hostname: "{{ vm.name }}"

  delegate_to: localhost
